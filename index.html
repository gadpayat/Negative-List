<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANNEX LIST TOGGLE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Consolas, monospace;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
    background:
    linear-gradient(rgba(0,0,0,.88), rgba(0,0,0,.88)),
    repeating-linear-gradient(
        -45deg,
        #111 0px,
        #111 25px,
        #4b0000 25px,
        #4b0000 50px
    );
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 100px,
        rgba(255,0,0,.05) 100px,
        rgba(255,0,0,.05) 120px
    );
    animation:scan 10s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    from{transform:translateX(0);}
    to{transform:translateX(120px);}
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 30px;
}

.title{
    text-align:center;
    font-size:3rem;
    color:#ff4d4d;
    margin-bottom:20px;
    text-shadow:0 0 20px red;
    letter-spacing:3px;
}

.warning{
    text-align:center;
    font-size:1rem;
    color:#ffcc00;
    margin-bottom:25px;
}

/* TOGGLE BUTTONS */
.toggle-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
}

.toggle-buttons button{
    padding:10px 20px;
    border:none;
    cursor:pointer;
    background:#ff0000;
    color:#fff;
    font-weight:bold;
    border-radius:8px;
    transition:.3s;
}

.toggle-buttons button:hover{
    background:#cc0000;
    transform:scale(1.05);
}

.content{
    background:rgba(0,0,0,.75);
    border:1px solid rgba(255,0,0,.4);
    border-radius:15px;
    padding:30px;
    line-height:1.8;
    font-size:20px;
    white-space:pre-wrap;
    min-height:300px;
    box-shadow:0 0 25px rgba(255,0,0,.2);
}

.cursor{
    display:inline-block;
    width:10px;
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

footer{
    text-align:center;
    padding:20px;
    color:#bbb;
    font-size:13px;
    margin-top:30px;
}

@media(max-width:768px){

.title{
    font-size:2rem;
}

.content{
    font-size:14px;
}

}

</style>
</head>

<body>

<div class="container">

    <h1 class="title">ANNEX LIST</h1>

    <p class="warning">
        Environmental and social safeguard exclusion lists for project compliance.
    </p>

    <!-- TOGGLE BUTTONS -->
    <div class="toggle-buttons">
        <button onclick="showAnnex('annex10')">ANNEX 10</button>
        <button onclick="showAnnex('annex11')">ANNEX 11</button>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <span id="typing"></span><span class="cursor">|</span>
    </div>

</div>

<footer>
    © 2026 Ghilous. All Rights Reserved.
</footer>

<script>

const annex10 = `ANNEX 10: ENVIRONMENTAL AND SOCIAL EXCLUSION LIST

The following are ineligible sub-project activities and/or expenditure types:
● Any development project or activity in strict protection zone (SPZ) of a protected area
● Projects classified as environmentally critical projects or PEISS Category A
● Hazardous materials such as explosives, pesticides, asbestos, herbicides, insecticides
● Construction or rehabilitation of dams affecting water systems
● Activities affecting cultural heritage sites such as graves, churches, archaeological sites
● Forced labor, child labor, or human trafficking activities
● Activities that exploit women or men
● Projects on disputed land ownership
● Stand-alone solar-powered street lights
● Construction in sacred or ICC/IP protected areas

END OF ANNEX 10`;

const annex11 = `ANNEX 11: NEGATIVE LIST

ACTIVITIES, EXPENDITURES, AND SUB-PROJECTS INCLUDED IN THE NEGATIVE LIST ARE THOSE THAT POSE NEGATIVE ENVIRONMENTAL AND/OR SOCIAL IMPACTS AND ARE THEREFORE INELIGIBLE FOR FUNDING UNDER THE KALAHI-CIDSS PROJECT.

═══════════════════════════════════════════════
PROHIBITED ACTIVITIES
═══════════════════════════════════════════════

a) Activities that can cause significant environmental degradation;
b) Activities affecting forests and natural ecosystems;
c) Activities affecting cultural and historical sites;
d) Use of goods on disputed land;
e) Demolition without consent;
f) Purchase of land;
g) Impact on Indigenous Peoples’ resources;
h) Government building construction (non-evacuation centers);
i) Non-approved infrastructure retrofitting;
j) Places of worship construction;
k) Hazardous materials use;
l) Fishing beyond limits;
m) Double-funded projects;
n) Cultural or fiesta events;
o) International travel;
p) Child labor exploitation;
q) Relief consumables;
r) Infrastructure maintenance (unless disaster-related);
s) Illegal trade activities;
t) Weapons production;
u) Logging in primary forests;
v) Harmful marine practices;

END OF ANNEX 11`;

let i = 0;
const speed = 20;

const typingElement = document.getElementById("typing");

function resetTyping(text) {
    typingElement.innerHTML = "";
    i = 0;

    function typeWriter() {
        if (i < text.length) {
            typingElement.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, speed);
        }
    }

    typeWriter();
}

function showAnnex(type) {
    if (type === "annex10") {
        resetTyping(annex10);
    } else {
        resetTyping(annex11);
    }
}

// default load
resetTyping(annex11);

</script>

</body>
</html>
