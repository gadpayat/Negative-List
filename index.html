<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Consolas, monospace;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
    background:
    linear-gradient(rgba(0,0,0,.88), rgba(0,0,0,.88)),
    repeating-linear-gradient(
        -45deg,
        #111 0px,
        #111 25px,
        #4b0000 25px,
        #4b0000 50px
    );
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 100px,
        rgba(255,0,0,.05) 100px,
        rgba(255,0,0,.05) 120px
    );
    animation:scan 10s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    from{transform:translateX(0);}
    to{transform:translateX(120px);}
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 30px;
}

.title{
    text-align:center;
    font-size:3rem;
    color:#ff4d4d;
    margin-bottom:20px;
    text-shadow:0 0 20px red;
    letter-spacing:3px;
}

.warning{
    text-align:center;
    font-size:1rem;
    color:#ffcc00;
    margin-bottom:25px;
}

.doc-btn{
    display:block;
    width:300px;
    margin:20px auto 40px;
    text-align:center;
    text-decoration:none;
    padding:15px;
    border-radius:10px;
    background:#ff0000;
    color:white;
    font-weight:bold;
    font-size:1rem;
    transition:.3s;
    box-shadow:0 0 20px rgba(255,0,0,.6);
}

.doc-btn:hover{
    transform:scale(1.05);
    background:#cc0000;
}

.content{
    background:rgba(0,0,0,.75);
    border:1px solid rgba(255,0,0,.4);
    border-radius:15px;
    padding:30px;
    line-height:1.8;
    font-size:20px;
    white-space:pre-wrap;
    min-height:300px;
    box-shadow:0 0 25px rgba(255,0,0,.2);
}

.cursor{
    display:inline-block;
    width:10px;
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

footer{
    text-align:center;
    padding:20px;
    color:#bbb;
    font-size:13px;
    margin-top:30px;
}

@media(max-width:768px){

.title{
    font-size:2rem;
}

}

}

<script>
const annex10 = `ANNEX 10: ENVIRONMENTAL AND SOCIAL EXCLUSION LIST

The following are ineligible sub-project activities and/or expenditure types:
● Any development project or activity in strict protection zone (SPZ) of a protected area
● Projects classified as “environmentally critical projects” or category A based on PEISS screening
● Environmentally hazardous materials such as chainsaws, explosives, pesticides, herbicides, insecticides, asbestos and other potentially dangerous materials
● Construction of any new dams or rehabilitation of existing dams including structural or operational changes
● Any activity affecting physical cultural heritage such as graves, temples, churches, historical relics, archaeological sites
● Activities involving forced labor, child labor exploitation, or human trafficking
● Activities that unfairly exploit women or men at any age
● Any activity on land with disputed ownership or tenure rights
● Stand-alone solar-powered street lights
● Construction in or adjacent to sacred, cultural, heritage, or ICC/IP areas

END OF ANNEX 10`;

const annex11 = `ANNEX 11: NEGATIVE LIST

ACTIVITIES, EXPENDITURES, AND SUB-PROJECTS INCLUDED IN THE NEGATIVE LIST ARE THOSE THAT POSE NEGATIVE ENVIRONMENTAL AND/OR SOCIAL IMPACTS AND ARE THEREFORE INELIGIBLE FOR FUNDING UNDER THE KALAHI-CIDSS PROJECT.

═══════════════════════════════════════════════
PROHIBITED ACTIVITIES
═══════════════════════════════════════════════

a) Activities that can cause any significant loss or degradation of critical natural habitats whether directly or indirectly;
b) Activities that could adversely affect forest and forest health;
c) Activities that could affect sites with archaeological, historical, religious, or unique natural values;
d) Use of goods and equipment on disputed lands;
e) Demolition without verified ownership consent;
f) Purchase or compensation for land;
g) Activities affecting Indigenous Peoples’ resources;
h) Government office construction (except evacuation centers);
i) Non-climate resilient retrofitting exceptions only;
j) Places of worship construction;
k) Hazardous materials use;
l) Over-limit fishing boats;
m) Double-funded activities;
n) Fiesta/cultural events;
o) International travel;
p) Child labor or harmful labor practices;
q) Relief consumables;
r) Maintenance of funded infrastructure unless disaster-related;
s) Illegal goods or trade;
t) Weapons and munitions;
u) Logging in primary forests;
v) Harmful marine practices.

END OF ANNEX 11`;

let currentText = annex11;
let i = 0;
const speed = 25;

const typingElement = document.getElementById("typing");

function resetTyping(text) {
    typingElement.innerHTML = "";
    i = 0;
    currentText = text;

    function typeWriter() {
        if (i < currentText.length) {
            typingElement.innerHTML += currentText.charAt(i);
            i++;
            setTimeout(typeWriter, speed);
        }
    }

    typeWriter();
}

function showAnnex(type) {
    if (type === 'annex10') {
        resetTyping(annex10);
    } else {
        resetTyping(annex11);
    }
}

resetTyping(annex11);
</script>
